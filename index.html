<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sascha Zeissler - Shapes</title>
    <style>
        @font-face {
            font-family: 'BrutalType';
            src: url('public/fonts/BrutalType-Regular-2.otf') format('opentype'),
                url('public/fonts/BrutalType-Regular-2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'BrutalType', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .content {
            padding: 32px 24px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ffffff;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .avatar img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .info {
            text-align: center;
            margin-bottom: 32px;
        }

        .name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .title {
            font-size: 14px;
            color: #999;
            margin-bottom: 4px;
        }

        .company {
            font-size: 12px;
            color: #666;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .link-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-text {
            font-size: 14px;
            flex: 1;
        }

        .link-arrow {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        /* Icons */
        .icon {
            width: 24px;
            height: 24px;
        }

        .icon-whatsapp {
            color: #25D366;
        }

        .icon-linkedin {
            color: #0A66C2;
        }

        .icon-email {
            color: #EA4335;
        }

        .icon-web {
            color: #ffffff;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
